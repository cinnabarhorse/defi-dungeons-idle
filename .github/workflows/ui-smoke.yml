name: ui-smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '23 4 * * *' # daily 04:23 UTC

concurrency:
  group: ui-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-agent-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      APP_URL: http://localhost:3001
      NEXT_PUBLIC_THIRDWEB_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_THIRDWEB_CLIENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env.test
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_THIRDWEB_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_THIRDWEB_CLIENT_ID }}
        run: |
          required=(SUPABASE_DB_URL SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY)
          missing=()
          for var in "${required[@]}"; do
            if [ -z "${!var:-}" ]; then
              missing+=("$var")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required secrets: ${missing[*]}"
            exit 1
          fi
          if [ -z "${DATABASE_URL:-}" ]; then
            DATABASE_URL="${SUPABASE_DB_URL}"
          fi
          cat > .env.test <<EOF
          SUPABASE_DB_URL=${SUPABASE_DB_URL}
          DATABASE_URL=${DATABASE_URL}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
          NEXT_PUBLIC_THIRDWEB_CLIENT_ID=${NEXT_PUBLIC_THIRDWEB_CLIENT_ID}
          EOF
          cat > apps/client/.env.test <<EOF
          NEXT_PUBLIC_THIRDWEB_CLIENT_ID=${NEXT_PUBLIC_THIRDWEB_CLIENT_ID}
          EOF

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start client dev server
        run: |
          pnpm --filter @gotchiverse/client dev > test-results/ui-agent-dev.log 2>&1 &
          for i in {1..60}; do
            if curl -sSf "$APP_URL" > /dev/null; then
              echo "App is up"
              exit 0
            fi
            sleep 2
          done
          echo "App did not start within timeout"
          exit 1

      - name: Run UI agent smoke tests
        run: pnpm test:ui:agent

      - name: Upload UI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-agent-artifacts
          path: test-results
