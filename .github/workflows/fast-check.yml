name: fast-check

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: fast-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      REQUIRE_ENV_TEST: 1
      NEXT_PUBLIC_THIRDWEB_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_THIRDWEB_CLIENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env.test
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_THIRDWEB_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_THIRDWEB_CLIENT_ID }}
        run: |
          SUPABASE_DB_URL="${SUPABASE_DB_URL:-postgres://postgres:postgres@127.0.0.1:54322/postgres}"
          DATABASE_URL="${DATABASE_URL:-$SUPABASE_DB_URL}"
          SUPABASE_URL="${SUPABASE_URL:-https://example.supabase.co}"
          SUPABASE_ANON_KEY="${SUPABASE_ANON_KEY:-test-anon-key}"
          SUPABASE_SERVICE_ROLE_KEY="${SUPABASE_SERVICE_ROLE_KEY:-test-service-role-key}"
          NEXT_PUBLIC_THIRDWEB_CLIENT_ID="${NEXT_PUBLIC_THIRDWEB_CLIENT_ID:-test-client-id}"
          cat > .env.test <<EOF
          SUPABASE_DB_URL=${SUPABASE_DB_URL}
          DATABASE_URL=${DATABASE_URL}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
          NEXT_PUBLIC_THIRDWEB_CLIENT_ID=${NEXT_PUBLIC_THIRDWEB_CLIENT_ID}
          EOF
          cat > apps/client/.env.test <<EOF
          NEXT_PUBLIC_THIRDWEB_CLIENT_ID=${NEXT_PUBLIC_THIRDWEB_CLIENT_ID}
          EOF

      - name: Run fast-check gate
        run: ./scripts/fast-check.sh
